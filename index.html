<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Web Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🎮 Hangman Game</h1>

        <div class="scoreboard">
            <p>🏆 Wins: <span id="wins">0</span></p>
            <p>💀 Losses: <span id="losses">0</span></p>
        </div>

        <div class="game-area">

            <pre id="hangman">
 +---+
 |   |
     |
     |
     |
     |
=========
            </pre>

            <div id="word-display">
                _ _ _ _ _ _ _
            </div>

            <p id="wrong-guesses">
                Wrong Attempts: 0/6
            </p>

            <div id="keyboard" class="keyboard">
                <!-- Letters generated by JavaScript -->
            </div>

            <div id="message">
                Guess a letter to begin!
            </div>

            <button id="restart-btn">
                🔄 Play Again
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
